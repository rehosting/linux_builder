name: Compile and release

on:
  # Releases are cut on merges into main and on dev_* tags (auto-versioned
  # below, like rehosting/penguin). NOTE: we deliberately do NOT trigger on
  # 'v*' tags — the release step now *creates* v* tags via version-increment,
  # so a 'v*' push trigger would make every release re-trigger itself.
  push:
    branches:
      - main
    tags:
      - 'dev_*'

  pull_request:
    branches:
      - main

  workflow_dispatch:

# Serialize per-ref so two main merges (or a merge + dev_* tag) can't race the
# auto-version step and compute/claim the same vX.Y.Z tag. PR runs cancel their
# own superseded runs; release (push) runs are never cancelled.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  prebuild:
    runs-on: rehosting-arc
    outputs:
      targets: ${{ steps.find_targets.outputs.targets }}
      versions: ${{ steps.find_targets.outputs.versions }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref }}

      - name: Log git revisions of all linux projects
        run: |
          echo "Main repo revision:" && git rev-parse HEAD
          echo
          echo "Submodule revisions:" && git submodule status
          echo
          echo "Full submodule SHAs:" && git submodule foreach 'echo $name: $(git rev-parse HEAD)'

      # NOTE: kernel-source preparation used to live here and wrote to the shared
      # hostPath on prebuild's node, which forced every build job onto that same
      # node. It now happens per-node inside each build job (see "Ensure kernel
      # sources on this node" below), so prebuild only needs to discover the
      # build matrix -- nothing node-specific.

      - name: Find valid targets and versions sets
        id: find_targets
        run: |
          TARGETS_SET=()
          VERSIONS_SET=()
          for version_dir in configs/*/; do
            version=$(basename "$version_dir")
            VERSIONS_SET+=("$version")
            for config_file in "$version_dir"*; do
              if [[ -f "$config_file" && ! "$config_file" =~ \.inc$  && ! "$config_file" =~ \.unused$ ]]; then
                target=$(basename "$config_file")
                TARGETS_SET+=("$target")
              fi
            done
          done
          UNIQUE_TARGETS=$(printf "%s\n" "${TARGETS_SET[@]}" | sort -u | awk '{printf "\"%s\",",$0}' | sed 's/,$//')
          UNIQUE_VERSIONS=$(printf "%s\n" "${VERSIONS_SET[@]}" | sort -u | awk '{printf "\"%s\",",$0}' | sed 's/,$//')
          TARGETS_OUTPUT="[${UNIQUE_TARGETS}]"
            VERSIONS_OUTPUT="[${UNIQUE_VERSIONS}]"
          echo "targets=$TARGETS_OUTPUT" >> $GITHUB_OUTPUT
          echo "versions=$VERSIONS_OUTPUT" >> $GITHUB_OUTPUT
          echo "Found valid targets: $TARGETS_OUTPUT"
          echo "Found valid versions: $VERSIONS_OUTPUT"

  # Build the kernel_builder image exactly once per run, push it to Harbor
  # under an immutable per-commit tag, and let every matrix build job pull it.
  #
  # Why a dedicated job (instead of building inside each matrix job):
  #   * The image is now target-agnostic (TARGET=latest bundles every
  #     cross-toolchain), so all 13 build jobs would otherwise rebuild the SAME
  #     multi-GB image. setup-buildx-action's docker-container driver keeps its
  #     own cache store, separate from the shared per-node Docker daemon, so the
  #     daemon's warm-image reuse does NOT cover a buildx `FROM` base -- every
  #     job re-pulled the full all-arch base. Building once here fixes that.
  #   * A single writer to the `:all_cache` registry cache means the cache
  #     actually accumulates run-to-run instead of 13 jobs racing to overwrite
  #     one ref.
  #   * An immutable `:<sha>` tag (vs a mutable `:latest`) is safe on the shared
  #     daemon's single image store -- concurrent jobs/PRs can't clobber each
  #     other's tag (same lesson as rehosting/penguin #893).
  build-image:
    runs-on: rehosting-arc
    if: github.event.pull_request.draft == false
    steps:
      - uses: actions/checkout@v4

      - name: Trust Harbor's self-signed certificate
        run: |
          echo "Fetching certificate from ${{ secrets.REHOSTING_ARC_REGISTRY }}"
          openssl s_client -showcerts -connect ${{ secrets.REHOSTING_ARC_REGISTRY }}:443 < /dev/null 2>/dev/null | openssl x509 -outform PEM | sudo tee /usr/local/share/ca-certificates/harbor.crt > /dev/null
          sudo update-ca-certificates

      - name: Log in to Rehosting Arc Registry
        uses: docker/login-action@v3
        with:
          registry: ${{secrets.REHOSTING_ARC_REGISTRY}}
          username: ${{ secrets.REHOSTING_ARC_REGISTRY_USER }}
          password: ${{ secrets.REHOSTING_ARC_REGISTRY_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          # See the note in the (removed) per-job build step / penguin c35bedc5:
          # don't pin moby/buildkit:master -- it regressed on the kernel-5.4
          # runners (can't mask /proc/acpi). Default pinned-stable buildkit + the
          # insecure Harbor registry config.
          driver-opts: |
            network=host
          buildkitd-config-inline: |
            [registry."${{ secrets.REHOSTING_ARC_REGISTRY }}"]
              insecure = true
              http = true

      - name: Build and push kernel_builder image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          # Immutable per-commit tag -- matrix jobs pull this exact ref.
          tags: |
            ${{ secrets.REHOSTING_ARC_REGISTRY }}/rehosting/linux_builder:${{ github.sha }}
          # TARGET=latest builds FROM the all-arch embedded-toolchains:latest so
          # the single built image carries every cross-toolchain and one image
          # serves every matrix target.
          build-args: |
            REGISTRY=${{ secrets.REHOSTING_ARC_REGISTRY }}/proxy
            TARGET=latest
          # Single shared build cache, written by this one job (no matrix race).
          cache-from: |
            type=registry,ref=${{secrets.REHOSTING_ARC_REGISTRY}}/rehosting/linux_builder:all_cache,mode=max
          cache-to: |
            type=registry,ref=${{secrets.REHOSTING_ARC_REGISTRY}}/rehosting/linux_builder:all_cache,mode=max

  build:
    needs: [prebuild, build-image]
    runs-on: rehosting-arc
    if: github.event.pull_request.draft == false

    strategy:
      matrix:
        target_version: ${{ fromJSON(needs.prebuild.outputs.targets) }}

    env:
      # The image built once by build-image; pulled (warm on the shared daemon
      # after the first job lands on a node) instead of rebuilt per target.
      KERNEL_BUILDER_IMAGE: ${{ secrets.REHOSTING_ARC_REGISTRY }}/rehosting/linux_builder:${{ github.sha }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref }}

      - name: Extract target and version
        id: extract
        run: |
          TARGET="${{ matrix.target_version }}"
          echo "target=$TARGET" >> $GITHUB_OUTPUT
          echo "Building target: $TARGET"

      - name: Ensure kernel sources on this node
        id: sources
        run: |
          set -eux
          SHARED="/home/runner/_shared"
          BASE_REPO_DIR="$SHARED/linux"
          BASE_REPO_URL="https://github.com/rehosting/linux"
          SRC_PARENT="$SHARED/linux_sources"
          mkdir -p "$SRC_PARENT"

          # Cache key = the pinned linux/<ver> submodule SHAs. The kernel source
          # only changes when a submodule is bumped, so a node reuses its tree
          # across runs and only re-populates on a real SHA change.
          KEY=$(git submodule status | awk '{gsub(/^[-+U ]+/,"",$1); print $1}' | sort | sha1sum | cut -c1-12)
          SRC_ROOT="$SRC_PARENT/$KEY"
          echo "kernel_src=$SRC_ROOT/linux" >> "$GITHUB_OUTPUT"

          # Per-node arbitration: whichever build job lands on a node first
          # populates that node's copy; the others block on the lock, then see
          # .ready and skip. flock on the shared fs is the right primitive --
          # GH 'concurrency' is cross-node and can't serialize same-node jobs.
          # This also avoids the cp/rsync races the single shared dir hit.
          exec 9>"$SRC_PARENT/.populate.lock"
          flock 9

          if [ ! -e "$SRC_ROOT/.ready" ]; then
            echo "Populating kernel sources for key $KEY on $(hostname)"
            # Node-local bare clone so submodule update pulls over fast local
            # file:// instead of hitting GitHub once per submodule per job.
            if [ ! -d "$BASE_REPO_DIR" ]; then
              git clone --bare "$BASE_REPO_URL" "$BASE_REPO_DIR"
              git -C "$BASE_REPO_DIR" config remote.origin.fetch "+refs/heads/*:refs/remotes/origin/*"
            fi
            git -C "$BASE_REPO_DIR" fetch origin --prune --tags --force

            rm -rf "$SRC_ROOT.tmp"
            mkdir -p "$SRC_ROOT.tmp"
            # Copy the (submodule-less) superproject checkout, then init the
            # kernel submodules into it from the local bare clone.
            cp -a "$GITHUB_WORKSPACE/." "$SRC_ROOT.tmp/"
            ( cd "$SRC_ROOT.tmp"
              sed -i "s|url = https://github.com/rehosting/linux.git|url = file://$BASE_REPO_DIR|g" .gitmodules
              git submodule sync
              GIT_ALLOW_PROTOCOL=file:https git submodule update --init --depth 1 --jobs 2 )
            # Publish atomically so a partial tree is never seen as ready.
            rm -rf "$SRC_ROOT"
            mv "$SRC_ROOT.tmp" "$SRC_ROOT"
            touch "$SRC_ROOT/.ready"
          else
            echo "Reusing cached kernel sources for key $KEY on $(hostname)"
          fi
          # Record last-use so the GC below doesn't reap an actively-reused tree.
          touch "$SRC_ROOT"

          # Best-effort GC: drop keyed trees (and stale .tmp dirs) untouched for
          # 14 days so the node-local cache can't grow unbounded across bumps.
          find "$SRC_PARENT" -mindepth 1 -maxdepth 1 -type d ! -path "$SRC_ROOT" -mtime +14 \
            -exec rm -rf {} + 2>/dev/null || true

          flock -u 9

      - name: Trust Harbor's self-signed certificate
        run: |
          echo "Fetching certificate from ${{ secrets.REHOSTING_ARC_REGISTRY }}"
          openssl s_client -showcerts -connect ${{ secrets.REHOSTING_ARC_REGISTRY }}:443 < /dev/null 2>/dev/null | openssl x509 -outform PEM | sudo tee /usr/local/share/ca-certificates/harbor.crt > /dev/null
          sudo update-ca-certificates

      - name: Log in to Rehosting Arc Registry
        uses: docker/login-action@v3
        with:
          registry: ${{secrets.REHOSTING_ARC_REGISTRY}}
          username: ${{ secrets.REHOSTING_ARC_REGISTRY_USER }}
          password: ${{ secrets.REHOSTING_ARC_REGISTRY_PASSWORD }}

      - name: Pull kernel_builder image
        run: |
          set -eux
          # Built once by the build-image job. On the shared per-node Docker
          # daemon the first matrix job to land on a node pulls the layers; every
          # later job on that node finds them already present (warm reuse). No
          # per-job buildx build anymore.
          docker pull "$KERNEL_BUILDER_IMAGE"

      - name: Build Kernel for ${{ matrix.target_version }}
        run: |
            set -eux
            TARGET="${{ matrix.target_version }}"
            VERSIONS_JSON='${{ needs.prebuild.outputs.versions }}'
            # Per-node kernel sources prepared by the "Ensure kernel sources on
            # this node" step above (node-agnostic: no dependency on prebuild's
            # node).
            SOURCES_DIR="${{ steps.sources.outputs.kernel_src }}"

            if [ -z "$VERSIONS_JSON" ] || [ "$VERSIONS_JSON" = "[]" ]; then
              VERSIONS=""
            else
              VERSIONS=$(echo "$VERSIONS_JSON" | jq -r '.[]' | xargs)
            fi

            # Node-shared, persistent compiler cache. Lives under the same
            # /home/runner/_shared mount the kernel sources use (mirrored into the
            # shared Docker daemon by kube#15), so mounting it into the build
            # container needs no extra plumbing. One dir shared by every
            # target/version on the node -- ccache is content-keyed and dedups, so
            # a warm cache turns the ~15-20 min from-scratch compile into a mostly-
            # cache-hit rebuild. _in_container_build.sh enables ccache iff CCACHE_DIR
            # is set (no-op otherwise).
            CCACHE_HOST_DIR="/home/runner/_shared/linux_builder_ccache"
            mkdir -p "$CCACHE_HOST_DIR"

            # Use the prebuilt image (--image) and mount the stable source
            # directory instead of the run-specific one, plus the shared ccache.
            ./build.sh --image "$KERNEL_BUILDER_IMAGE" --targets "$TARGET" ${VERSIONS:+--versions "$VERSIONS"} \
              --extra-docker-opts "-v $SOURCES_DIR:/app/linux -v $CCACHE_HOST_DIR:/ccache -e CCACHE_DIR=/ccache -e CCACHE_MAXSIZE=15G"

            # Stage per-target outputs in the workspace; they are handed to the
            # aggregate job via workflow artifacts (below) instead of a shared
            # hostPath, so build and aggregate need not run on the same node.
            mkdir -p build-output
            mv kernels-latest.tar.gz build-output/kernels-latest-${TARGET}.tar.gz
            mv kernel-devel-all.tar.gz build-output/kernel-devel-all-${TARGET}.tar.gz

      - name: Upload per-target kernel artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kernels-${{ matrix.target_version }}
          path: build-output/
          retention-days: 1

  aggregate:
    # Runs on releases (push to main / dev_* tag) AND on manual dispatch so the
    # full download+combine round-trip can be exercised without cutting a
    # release (the publish step below is gated to push events only). Never runs
    # for pull_request.
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    needs: build
    runs-on: rehosting-arc
    env:
      MATRIX_VERSIONS: ${{ toJSON(needs.build.strategy.matrix.version) }}
    permissions:
      actions: write
      contents: write
    steps:
      - name: Trust Harbor's self-signed certificate
        run: |
          echo "Fetching certificate from ${{ secrets.REHOSTING_ARC_REGISTRY }}"
          openssl s_client -showcerts -connect ${{ secrets.REHOSTING_ARC_REGISTRY }}:443 < /dev/null 2>/dev/null | openssl x509 -outform PEM | sudo tee /usr/local/share/ca-certificates/harbor.crt > /dev/null
          sudo update-ca-certificates
      - name: Log in to Rehosting Arc Registry
        uses: docker/login-action@v3
        with:
          registry: ${{secrets.REHOSTING_ARC_REGISTRY}}
          username: ${{ secrets.REHOSTING_ARC_REGISTRY_USER }}
          password: ${{ secrets.REHOSTING_ARC_REGISTRY_PASSWORD }}

      - name: Download all per-target kernel artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: kernels-*
          path: build-output
          merge-multiple: true

      - name: Combine all kernels into a single archive
        run: |
          set -eux
          # Artifacts downloaded by the step above land here (workspace-local,
          # node-agnostic) instead of the old /home/runner/_shared/runs hostPath.
          BUILD_OUTPUT="$GITHUB_WORKSPACE/build-output"

          echo "[DEBUG] Listing available per-target kernel archives:"
          find "$BUILD_OUTPUT" -maxdepth 1 -name "kernels-latest-*.tar.gz" -print || true

          rm -rf combined-kernels && mkdir combined-kernels

          for archive in "$BUILD_OUTPUT"/kernels-latest-*.tar.gz; do
            [ -e "$archive" ] || continue
            echo "[DEBUG] Extracting $archive into combined-kernels"
            tar -xzf "$archive" -C combined-kernels
          done

          echo "[DEBUG] Contents of combined-kernels after extraction:"
          find combined-kernels || true

          # Merge osi.config for every detected version directory
          if [ -d combined-kernels/kernels ]; then
            for vdir in combined-kernels/kernels/*; do
              [ -d "$vdir" ] || continue
              version=$(basename "$vdir")
              echo "[DEBUG] Merging osi.config for version $version"
              {
                for archive in "$BUILD_OUTPUT"/kernels-latest-*.tar.gz; do
                  [ -e "$archive" ] || continue
                  tar -O -xf "$archive" "kernels/$version/osi.config" 2>/dev/null || true
                done
              } > "combined-kernels/kernels/$version/osi.config"
            done
          fi

          tar -czvf kernels-latest.tar.gz -C combined-kernels .

      - name: Aggregate all kernel-devel artifacts
        run: |
          set -eux
          # Artifacts downloaded by the step above land here (workspace-local,
          # node-agnostic) instead of the old /home/runner/_shared/runs hostPath.
          BUILD_OUTPUT="$GITHUB_WORKSPACE/build-output"

          mkdir -p kernel-devel-all
          for archive in "$BUILD_OUTPUT"/kernel-devel-all-*.tar.gz; do
            [ -e "$archive" ] || continue
            echo "[DEBUG] Extracting $archive into kernel-devel-all/"
            tar -xzf "$archive" -C kernel-devel-all
          done
          tar -czvf kernel-devel-all.tar.gz -C kernel-devel-all .

      # Auto-version like rehosting/penguin: query the GitHub API for the latest
      # release and increment. On main this yields a clean vX.Y.Z; on a non-main
      # ref (a dev_* tag) version-increment appends a -pre suffix.
      - name: Get next version
        id: version
        uses: reecetech/version-increment@2023.10.1
        with:
          use_api: true

      - name: Create and publish release
        # Only publish on real release events (main merge / dev_* tag). A manual
        # workflow_dispatch still runs everything above to validate the pipeline
        # but does not create a release.
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v1
        with:
          files: |
            kernels-latest.tar.gz
            kernel-devel-all.tar.gz
          token: ${{ secrets.GITHUB_TOKEN }}
          tag_name: ${{ steps.version.outputs.v-version }}
          name: Release ${{ steps.version.outputs.v-version }}
          generate_release_notes: true
          # dev_* tags publish as prereleases; main merges as full releases.
          prerelease: ${{ startsWith(github.ref, 'refs/tags/dev_') }}
      # (Removed the per-run /home/runner/_shared/runs cleanup: outputs now flow
      # through workflow artifacts, which expire on their own retention, and the
      # workspace build-output dir is ephemeral.)
